<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordlek</title>
<style>
  :root{
    --bg: #121213;
    --tile-empty: #3a3a3c;
    --tile-border: #565758;
    --correct: #3ddc84;
    --present: #e8b84b;
    --absent: #3a3a3c;
    --text: #eef0f6;
    --muted: #8a93ad;
    --key-bg: #818384;
  }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    color: var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    overflow:hidden;
  }
  #hud{ display:flex; gap:24px; align-items:center; }
  #hud .label{ display:block; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
  #hud b{ font-size:16px; color:var(--correct); }

  #wrap{ position:relative; display:flex; flex-direction:column; align-items:center; gap:16px; }

  #grid{ display:grid; grid-template-rows:repeat(6, 1fr); gap:6px; }
  .row{ display:grid; grid-template-columns:repeat(5, 46px); gap:6px; }
  .tile{
    width:46px; height:46px; border:2px solid var(--tile-border);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; text-transform:uppercase;
    border-radius:4px; transition: transform .12s ease;
  }
  .tile.filled{ border-color:#8a93ad; }
  .tile.correct{ background:var(--correct); border-color:var(--correct); color:#0b0b0b; }
  .tile.present{ background:var(--present); border-color:var(--present); color:#0b0b0b; }
  .tile.absent{ background:var(--absent); border-color:var(--absent); color:var(--muted); }
  .tile.pop{ animation: pop .1s ease; }
  @keyframes pop{ 0%{transform:scale(1.08);} 100%{transform:scale(1);} }
  .row.shake{ animation: shake .3s ease; }
  @keyframes shake{
    10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-6px);} 40%,60%{transform:translateX(6px);}
  }

  #keyboard{ display:flex; flex-direction:column; gap:6px; }
  .krow{ display:flex; gap:5px; justify-content:center; }
  .key{
    font-family:inherit; font-size:12px; font-weight:700; text-transform:uppercase;
    padding:12px 8px; min-width:30px; border-radius:5px; border:none; cursor:pointer;
    background:var(--key-bg); color:#fff;
  }
  .key.wide{ padding:12px 12px; font-size:10.5px; }
  .key.correct{ background:var(--correct); color:#0b0b0b; }
  .key.present{ background:var(--present); color:#0b0b0b; }
  .key.absent{ background:#3a3a3c; color:#6b6b6d; }

  .overlay{
    position:absolute; inset:0;
    background:rgba(9,11,16,0.9);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:20px; border-radius:8px;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{ margin:0; font-size:22px; }
  .overlay p{ margin:0; color:var(--muted); font-size:13px; max-width:280px; line-height:1.5; }
  .btn{
    font-family:inherit; font-size:12.5px; font-weight:700; padding:10px 20px;
    border-radius:999px; border:none; cursor:pointer; background:var(--correct); color:#0b0b0b;
  }
  #hint{ font-size:11.5px; color:var(--muted); text-align:center; max-width:320px; }
  #toastLayer{ position:absolute; top:-40px; left:50%; transform:translateX(-50%); z-index:10; }
  .toast{
    background:#fff; color:#0b0b0b; font-weight:700; font-size:12px;
    padding:8px 14px; border-radius:6px; white-space:nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Försök</span><b id="attemptLabel">0 / 6</b></div>
  <div><span class="label">Vunna</span><b id="winLabel">0</b></div>
  <div><span class="label">Streak</span><b id="streakLabel">0</b></div>
</div>

<div id="wrap">
  <div id="toastLayer"></div>
  <div id="grid"></div>
  <div id="keyboard"></div>

  <div class="overlay hidden" id="endOverlay">
    <h2 id="endTitle"></h2>
    <p id="endText"></p>
    <button class="btn" id="retryBtn">Nytt ord</button>
  </div>
</div>

<div id="hint">Gissa 5-bokstavsordet på 6 försök. Grönt = rätt bokstav, rätt plats. Gult = rätt bokstav, fel plats.</div>

<script>
(function(){
  // A compact list of real, verified 5-letter Swedish words.
  const WORDS = [
    "HUSET","BOKEN","BILEN","TÅGET","SOLEN","MÅNEN","VÄGEN","GATAN","SLOTT","MUREN",
    "TAKET","KÖKET","LAMPA","MATTA","PENNA","FÅGEL","GRÖNA","BLÅTT","REGNA","SNÖAR",
    "VÅREN","KYRKA","BRONS","LANDA","BAKAR","KOKAR","LAGAR","ODLAR","JAGAR","FISKA",
    "BADAR","CYKLA","FLYGA","HOPPA","LÖPER","SIMMA","RITAR","MÅLAR","SPELA","DANSA",
    "SJUNG","TALAR","LÄSER","SKRIV","DRICK","SOVER","VAKNA","LEKER","LYCKA","FADER",
    "MODER","OSTEN","FISKE","SEGEL","MOTOR","CYKEL","BORDE","STORT","SNABB","STARK",
    "FRISK","GLASS","KAFFE","FRUKT","ÄPPLE","BANAN"
  ];

  const grid = document.getElementById('grid');
  const keyboard = document.getElementById('keyboard');
  const attemptLabel = document.getElementById('attemptLabel');
  const winLabel = document.getElementById('winLabel');
  const streakLabel = document.getElementById('streakLabel');
  const endOverlay = document.getElementById('endOverlay');
  const endTitle = document.getElementById('endTitle');
  const endText = document.getElementById('endText');
  const retryBtn = document.getElementById('retryBtn');
  const toastLayer = document.getElementById('toastLayer');

  const ROWS = 6, COLS = 5;
  let answer = '';
  let guesses = [];
  let current = '';
  let gameOver = false;
  const keyStates = {};

  function loadStats(){
    try { return JSON.parse(localStorage.getItem('wordleStats') || '{"wins":0,"streak":0,"best":0}'); }
    catch(e){ return {wins:0, streak:0, best:0}; }
  }
  function saveStats(s){ localStorage.setItem('wordleStats', JSON.stringify(s)); }
  let stats = loadStats();
  winLabel.textContent = stats.wins;
  streakLabel.textContent = stats.streak;

  function pickWord(){
    // Deterministic "word of the day" so everyone gets the same puzzle,
    // but falls back to random if the date math ever misbehaves.
    const dayIndex = Math.floor(Date.now() / 86400000);
    const idx = ((dayIndex % WORDS.length) + WORDS.length) % WORDS.length;
    return WORDS[idx] || WORDS[Math.floor(Math.random()*WORDS.length)];
  }

  function buildGrid(){
    grid.innerHTML = '';
    for (let r=0;r<ROWS;r++){
      const row = document.createElement('div');
      row.className = 'row';
      row.id = 'row-' + r;
      for (let c=0;c<COLS;c++){
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${r}-${c}`;
        row.appendChild(tile);
      }
      grid.appendChild(row);
    }
  }

  const KEY_ROWS = ["QWERTYUIOPÅ", "ASDFGHJKLÖÄ", "ENTERZXCVBNM⌫"];
  function buildKeyboard(){
    keyboard.innerHTML = '';
    KEY_ROWS.forEach(rowStr=>{
      const row = document.createElement('div');
      row.className = 'krow';
      const keys = rowStr === "ENTERZXCVBNM⌫" ? ["ENTER","Z","X","C","V","B","N","M","⌫"] : rowStr.split('');
      keys.forEach(k=>{
        const btn = document.createElement('button');
        btn.className = 'key' + (k.length > 1 ? ' wide' : '');
        btn.textContent = k === 'ENTER' ? 'ENTER' : k;
        btn.dataset.key = k;
        btn.addEventListener('click', ()=> handleKey(k));
        row.appendChild(btn);
      });
      keyboard.appendChild(row);
    });
  }

  function showToast(msg){
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    toastLayer.innerHTML = '';
    toastLayer.appendChild(el);
    setTimeout(()=> el.remove(), 1400);
  }

  function handleKey(k){
    if (gameOver) return;
    if (k === 'ENTER'){ submitGuess(); return; }
    if (k === '⌫'){ current = current.slice(0,-1); renderCurrentRow(); return; }
    if (current.length < COLS && /^[A-ZÅÄÖ]$/.test(k)){
      current += k;
      renderCurrentRow();
    }
  }

  function renderCurrentRow(){
    const r = guesses.length;
    for (let c=0;c<COLS;c++){
      const tile = document.getElementById(`tile-${r}-${c}`);
      const ch = current[c] || '';
      tile.textContent = ch;
      tile.classList.toggle('filled', !!ch);
    }
  }

  function submitGuess(){
    if (current.length < COLS){
      shakeRow(guesses.length);
      showToast('För få bokstäver');
      return;
    }
    const r = guesses.length;
    const result = scoreGuess(current, answer);
    guesses.push({ word: current, result });

    result.forEach((state, c)=>{
      const tile = document.getElementById(`tile-${r}-${c}`);
      setTimeout(()=>{
        tile.classList.add(state, 'pop');
      }, c * 120);
      const letter = current[c];
      const rank = { absent:0, present:1, correct:2 };
      if (!(letter in keyStates) || rank[state] > rank[keyStates[letter]]){
        keyStates[letter] = state;
      }
    });

    setTimeout(updateKeyboardColors, COLS * 120 + 50);

    const won = current === answer;
    const done = won || guesses.length >= ROWS;

    if (done){
      setTimeout(()=> finishGame(won), COLS * 120 + 300);
    }
    current = '';
    attemptLabel.textContent = `${guesses.length} / ${ROWS}`;
  }

  function shakeRow(r){
    const row = document.getElementById('row-' + r);
    row.classList.add('shake');
    setTimeout(()=> row.classList.remove('shake'), 300);
  }

  function scoreGuess(guess, ans){
    const result = Array(COLS).fill('absent');
    const ansChars = ans.split('');
    const used = Array(COLS).fill(false);

    for (let i=0;i<COLS;i++){
      if (guess[i] === ansChars[i]){
        result[i] = 'correct';
        used[i] = true;
      }
    }
    for (let i=0;i<COLS;i++){
      if (result[i] === 'correct') continue;
      const idx = ansChars.findIndex((ch,j) => ch === guess[i] && !used[j]);
      if (idx !== -1){
        result[i] = 'present';
        used[idx] = true;
      }
    }
    return result;
  }

  function updateKeyboardColors(){
    document.querySelectorAll('.key').forEach(btn=>{
      const k = btn.dataset.key;
      const state = keyStates[k];
      if (state){
        btn.classList.remove('correct','present','absent');
        btn.classList.add(state);
      }
    });
  }

  function finishGame(won){
    gameOver = true;
    if (won){
      stats.wins++;
      stats.streak++;
      if (stats.streak > (stats.best||0)) stats.best = stats.streak;
      endTitle.textContent = ['Snyggt!','Perfekt!','Grymt jobbat!','Bra gissat!'][Math.min(guesses.length-1,3)];
      endText.textContent = `Du löste dagens ord på ${guesses.length} försök.`;
    } else {
      stats.streak = 0;
      endTitle.textContent = 'Nästa gång!';
      endText.textContent = `Ordet var: ${answer}`;
    }
    saveStats(stats);
    winLabel.textContent = stats.wins;
    streakLabel.textContent = stats.streak;
    localStorage.setItem('wordleBestStreak', String(stats.best || 0));
    endOverlay.classList.remove('hidden');
  }

  document.addEventListener('keydown', (e)=>{
    if (gameOver) return;
    if (e.key === 'Enter'){ handleKey('ENTER'); return; }
    if (e.key === 'Backspace'){ handleKey('⌫'); return; }
    const k = e.key.toUpperCase();
    if (/^[A-ZÅÄÖ]$/.test(k)) handleKey(k);
  });

  function newRound(forceRandom){
    answer = forceRandom ? WORDS[Math.floor(Math.random()*WORDS.length)] : pickWord();
    guesses = [];
    current = '';
    gameOver = false;
    Object.keys(keyStates).forEach(k => delete keyStates[k]);
    buildGrid();
    buildKeyboard();
    attemptLabel.textContent = `0 / ${ROWS}`;
    endOverlay.classList.add('hidden');
  }

  retryBtn.addEventListener('click', ()=> newRound(true));

  newRound(false);
})();
</script>

<script src="../../worker-config.js"></script>
<script src="i18n-data.js"></script>
<script src="../../i18n.js"></script>
</body>
</html>
