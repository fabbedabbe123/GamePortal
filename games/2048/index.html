<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  :root{
    --bg: #12141c;
    --board: #1a1e2a;
    --cell: #222839;
    --text: #eef0f6;
    --muted: #8a93ad;
    --accent: #e8b84b;
  }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    color: var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    overflow:hidden;
  }
  #hud{ display:flex; gap:24px; align-items:center; }
  #hud .box{ background:var(--board); border-radius:8px; padding:8px 16px; text-align:center; }
  #hud .label{ display:block; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
  #hud b{ font-size:18px; color:var(--accent); }
  #newGameBtn{
    font-family:inherit; font-size:12px; font-weight:700; padding:9px 16px;
    border-radius:999px; border:none; cursor:pointer; background:var(--accent); color:#0b0b0b;
  }
  #wrap{ position:relative; }
  #board{
    display:grid; grid-template-columns: repeat(4, 76px); grid-template-rows: repeat(4, 76px);
    gap:10px; background:var(--board); padding:10px; border-radius:10px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.7);
  }
  .cell{
    background:var(--cell); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700; color:var(--text);
    transition: background .15s ease, transform .1s ease;
  }
  .cell[data-v="0"]{ color:transparent; }
  .cell[data-v="2"]{ background:#2c3348; }
  .cell[data-v="4"]{ background:#33405c; }
  .cell[data-v="8"]{ background:#e8b84b; color:#12141c; }
  .cell[data-v="16"]{ background:#e8a44b; color:#12141c; }
  .cell[data-v="32"]{ background:#e88f4b; color:#12141c; }
  .cell[data-v="64"]{ background:#e8734b; color:#12141c; }
  .cell[data-v="128"]{ background:#4fc9c0; color:#12141c; font-size:22px; }
  .cell[data-v="256"]{ background:#4fb3c9; color:#12141c; font-size:22px; }
  .cell[data-v="512"]{ background:#4f8fc9; color:#12141c; font-size:22px; }
  .cell[data-v="1024"]{ background:#8a6bff; color:#12141c; font-size:18px; }
  .cell[data-v="2048"]{ background:#ff6bd0; color:#12141c; font-size:18px; }
  .cell.pop{ animation: pop .18s ease; }
  @keyframes pop{ 0%{transform:scale(0.7);} 100%{transform:scale(1);} }

  .overlay{
    position:absolute; inset:0; border-radius:10px;
    background:rgba(9,11,16,0.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:20px;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{ margin:0; font-size:22px; }
  .overlay p{ margin:0; color:var(--muted); font-size:13px; max-width:280px; line-height:1.5; }
  .btn{
    font-family:inherit; font-size:12.5px; font-weight:700; padding:10px 20px;
    border-radius:999px; border:none; cursor:pointer; background:var(--accent); color:#0b0b0b;
  }
  #hint{ font-size:11.5px; color:var(--muted); text-align:center; max-width:320px; }
</style>
</head>
<body>

<div id="hud">
  <div class="box"><span class="label">Poäng</span><b id="scoreLabel">0</b></div>
  <div class="box"><span class="label">Bäst</span><b id="bestLabel">0</b></div>
  <button id="newGameBtn">Ny omgång</button>
</div>

<div id="wrap">
  <div id="board"></div>
  <div class="overlay hidden" id="winOverlay">
    <h2>2048! 🎉</h2>
    <p>Du nådde 2048! Fortsätt spela för högre poäng, eller starta om.</p>
    <button class="btn" id="continueBtn">Fortsätt</button>
  </div>
  <div class="overlay hidden" id="overOverlay">
    <h2>GAME OVER</h2>
    <p id="overText"></p>
    <button class="btn" id="retryBtn">Spela igen</button>
  </div>
</div>

<div id="hint">Piltangenter / WASD på dator, svep på mobil. Slå ihop lika brickor för att fördubbla dem.</div>

<script>
(function(){
  const SIZE = 4;
  let grid, score, won, over;

  const boardEl = document.getElementById('board');
  const scoreLabel = document.getElementById('scoreLabel');
  const bestLabel = document.getElementById('bestLabel');
  const winOverlay = document.getElementById('winOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const overText = document.getElementById('overText');
  const continueBtn = document.getElementById('continueBtn');
  const retryBtn = document.getElementById('retryBtn');
  const newGameBtn = document.getElementById('newGameBtn');

  function loadBest(){ return parseInt(localStorage.getItem('game2048Best') || '0', 10); }
  function saveBest(v){ localStorage.setItem('game2048Best', String(v)); }
  bestLabel.textContent = loadBest();

  function emptyGrid(){
    return Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  }

  function emptyCells(){
    const cells = [];
    for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (grid[r][c] === 0) cells.push([r,c]);
    return cells;
  }

  function addRandomTile(){
    const cells = emptyCells();
    if (!cells.length) return;
    const [r,c] = cells[Math.floor(Math.random()*cells.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render(justAdded){
    boardEl.innerHTML = '';
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const div = document.createElement('div');
        div.className = 'cell';
        const v = grid[r][c];
        div.dataset.v = v;
        div.textContent = v || '';
        if (justAdded && justAdded.r === r && justAdded.c === c) div.classList.add('pop');
        boardEl.appendChild(div);
      }
    }
    scoreLabel.textContent = score;
  }

  function reset(){
    grid = emptyGrid();
    score = 0;
    won = false;
    over = false;
    winOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    addRandomTile();
    addRandomTile();
    render();
  }

  function slideRowLeft(row){
    const vals = row.filter(v => v !== 0);
    const merged = [];
    let gained = 0;
    for (let i=0;i<vals.length;i++){
      if (vals[i] === vals[i+1]){
        const mergedVal = vals[i]*2;
        merged.push(mergedVal);
        gained += mergedVal;
        if (mergedVal === 2048) won = true;
        i++;
      } else {
        merged.push(vals[i]);
      }
    }
    while (merged.length < SIZE) merged.push(0);
    return { row: merged, gained };
  }

  function rotateGridCW(g){
    const n = g.length;
    const res = emptyGrid();
    for (let r=0;r<n;r++) for (let c=0;c<n;c++) res[c][n-1-r] = g[r][c];
    return res;
  }

  function move(direction){
    if (over) return;
    // Normalize to "left" by rotating, slide, then rotate back
    let rotations = { left:0, up:3, right:2, down:1 }[direction];
    let g = grid;
    for (let i=0;i<rotations;i++) g = rotateGridCW(g);

    let moved = false;
    let gainedTotal = 0;
    const newG = [];
    for (let r=0;r<SIZE;r++){
      const { row, gained } = slideRowLeft(g[r]);
      if (row.join(',') !== g[r].join(',')) moved = true;
      gainedTotal += gained;
      newG.push(row);
    }
    g = newG;
    for (let i=0;i<(4-rotations)%4;i++) g = rotateGridCW(g);

    if (!moved) return;
    grid = g;
    score += gainedTotal;
    addRandomTile();
    render();

    if (score > loadBest()){ saveBest(score); bestLabel.textContent = score; }

    if (won && !winOverlay.dataset.shown){
      winOverlay.classList.remove('hidden');
      winOverlay.dataset.shown = '1';
    }
    if (!canMove()){
      over = true;
      overText.textContent = `Inga fler drag kvar. Poäng: ${score}.`;
      overOverlay.classList.remove('hidden');
    }
  }

  function canMove(){
    if (emptyCells().length) return true;
    for (let r=0;r<SIZE;r++){
      for (let c=0;c<SIZE;c++){
        const v = grid[r][c];
        if (c < SIZE-1 && grid[r][c+1] === v) return true;
        if (r < SIZE-1 && grid[r+1][c] === v) return true;
      }
    }
    return false;
  }

  document.addEventListener('keydown', (e)=>{
    const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
                  a:'left', d:'right', w:'up', s:'down', A:'left', D:'right', W:'up', S:'down' };
    if (map[e.key]){ e.preventDefault(); move(map[e.key]); }
  });

  let touchStart = null;
  boardEl.addEventListener('touchstart', (e)=>{ touchStart = e.touches[0]; }, {passive:true});
  boardEl.addEventListener('touchend', (e)=>{
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.clientX;
    const dy = t.clientY - touchStart.clientY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
    touchStart = null;
  });

  continueBtn.addEventListener('click', ()=> winOverlay.classList.add('hidden'));
  retryBtn.addEventListener('click', reset);
  newGameBtn.addEventListener('click', reset);

  reset();
})();
</script>

<script src="../../worker-config.js"></script>
<script src="i18n-data.js"></script>
<script src="../../i18n.js"></script>
</body>
</html>
