<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  :root{
    --bg: #0d1117;
    --grid: #161b22;
    --snake: #3ddc84;
    --snake-head: #4fc9c0;
    --food: #e8b84b;
    --text: #eef0f6;
    --muted: #8a93ad;
  }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    color: var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px;
    overflow:hidden;
  }
  #hud{ display:flex; gap:24px; font-size:13px; }
  #hud b{ color:var(--snake-head); font-size:17px; }
  #hud .label{ display:block; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
  #wrap{ position:relative; }
  canvas{ display:block; border-radius:8px; box-shadow:0 20px 50px -20px rgba(0,0,0,0.7); }
  .overlay{
    position:absolute; inset:0; border-radius:8px;
    background:rgba(9,11,16,0.82);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:20px;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{ margin:0; font-size:20px; }
  .overlay p{ margin:0; color:var(--muted); font-size:13px; max-width:280px; line-height:1.5; }
  .btn{
    font-family:inherit; font-size:12.5px; font-weight:700;
    padding:10px 20px; border-radius:999px; border:none; cursor:pointer;
    background:var(--snake-head); color:#0b0b0b;
  }
  #hint{ font-size:11.5px; color:var(--muted); }
  #touchpad{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  #touchpad .row{ display:flex; gap:6px; }
  #touchpad button{
    width:48px; height:48px; border-radius:10px; border:1px solid #2e3548;
    background:var(--grid); color:var(--text); font-size:18px; cursor:pointer;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Poäng</span><b id="scoreLabel">0</b></div>
  <div><span class="label">Bäst</span><b id="bestLabel">0</b></div>
</div>

<div id="wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>SNAKE</h2>
    <p>Styr med piltangenterna eller WASD. Ät guldbitarna, väx dig lång, krocka inte med väggen eller dig själv.</p>
    <button class="btn" id="startBtn">Sätt igång</button>
  </div>
  <div class="overlay hidden" id="overOverlay">
    <h2>GAME OVER</h2>
    <p id="overText"></p>
    <button class="btn" id="retryBtn">Spela igen</button>
  </div>
</div>

<div id="hint">Piltangenter / WASD på dator. Knapparna nedan på mobil.</div>
<div id="touchpad">
  <div class="row"><button data-dir="up">↑</button></div>
  <div class="row">
    <button data-dir="left">←</button>
    <button data-dir="down">↓</button>
    <button data-dir="right">→</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const COLS = canvas.width / CELL;
  const ROWS = canvas.height / CELL;

  const scoreLabel = document.getElementById('scoreLabel');
  const bestLabel = document.getElementById('bestLabel');
  const startOverlay = document.getElementById('startOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const overText = document.getElementById('overText');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');

  let snake, dir, nextDir, food, score, running, tickMs, timer;

  function loadBest(){ return parseInt(localStorage.getItem('snakeBest') || '0', 10); }
  function saveBest(v){ localStorage.setItem('snakeBest', String(v)); }
  bestLabel.textContent = loadBest();

  function randCell(){
    return { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  }

  function placeFood(){
    let f;
    do { f = randCell(); } while (snake.some(s => s.x === f.x && s.y === f.y));
    food = f;
  }

  function reset(){
    snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    tickMs = 110;
    scoreLabel.textContent = 0;
    placeFood();
    running = true;
  }

  function gameOver(){
    running = false;
    clearInterval(timer);
    const best = loadBest();
    let msg = `Du fick ${score} poäng.`;
    if (score > best){
      saveBest(score);
      bestLabel.textContent = score;
      msg += ' Nytt rekord!';
    }
    overText.textContent = msg;
    overOverlay.classList.remove('hidden');
  }

  function tick(){
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS){
      gameOver(); return;
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)){
      gameOver(); return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y){
      score++;
      scoreLabel.textContent = score;
      placeFood();
      if (tickMs > 55) tickMs -= 2;
      clearInterval(timer);
      timer = setInterval(tick, tickMs);
    } else {
      snake.pop();
    }
    draw();
  }

  function draw(){
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let x=0;x<COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
    }
    for (let y=0;y<ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
    }

    ctx.fillStyle = '#e8b84b';
    ctx.beginPath();
    ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
    ctx.fill();

    snake.forEach((s,i)=>{
      ctx.fillStyle = i === 0 ? '#4fc9c0' : '#3ddc84';
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    });
  }

  function setDir(x,y){
    if (dir.x === -x && dir.y === -y) return; // no reversing into yourself
    nextDir = {x,y};
  }

  document.addEventListener('keydown', (e)=>{
    if (!running) return;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setDir(0,-1);
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setDir(0,1);
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setDir(-1,0);
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setDir(1,0);
  });

  document.querySelectorAll('#touchpad button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (!running) return;
      const d = btn.dataset.dir;
      if (d==='up') setDir(0,-1);
      if (d==='down') setDir(0,1);
      if (d==='left') setDir(-1,0);
      if (d==='right') setDir(1,0);
    });
  });

  // Basic swipe support
  let touchStart = null;
  canvas.addEventListener('touchstart', (e)=>{ touchStart = e.touches[0]; }, {passive:true});
  canvas.addEventListener('touchend', (e)=>{
    if (!touchStart || !running) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.clientX;
    const dy = t.clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)){
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  });

  function start(){
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    reset();
    draw();
    clearInterval(timer);
    timer = setInterval(tick, tickMs);
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);
})();
</script>

<script src="../../worker-config.js"></script>
<script src="i18n-data.js"></script>
<script src="../../i18n.js"></script>
</body>
</html>
