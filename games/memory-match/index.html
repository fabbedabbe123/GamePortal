<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartridge Match</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0f16; color: #eef0f6;
    font-family: "JetBrains Mono", monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
  }
  h1 { font-size: 16px; letter-spacing: 2px; color: #e8b84b; margin: 0; }
  #moves { font-size: 12px; color: #8a93ad; }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 64px);
    gap: 10px;
  }
  .card {
    width: 64px; height: 64px;
    background: #1a1e2a;
    border: 1px solid #2e3548;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .card.flipped, .card.matched { background: #222738; transform: scale(1.03); }
  .card.matched { border-color: #4fc9c0; opacity: 0.55; cursor: default; }
  .card .face { display: none; }
  .card.flipped .face, .card.matched .face { display: block; }
  #win {
    font-size: 13px; color: #4fc9c0; height: 18px;
  }
  button#again {
    background: #222738; border: 1px solid #2e3548; color: #eef0f6;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
  }
</style>
</head>
<body>
<h1>CARTRIDGE MATCH</h1>
<div id="moves">Drag: 0</div>
<div id="board"></div>
<div id="win"></div>
<button id="again">Spela igen</button>

<script>
const icons = ["🎮","👾","🕹️","⭐","💾","🔥","⚡","🏆"];
const board = document.getElementById("board");
const movesEl = document.getElementById("moves");
const winEl = document.getElementById("win");

let cards = [];
let flipped = [];
let matches = 0;
let moves = 0;
let locked = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function build() {
  cards = shuffle([...icons, ...icons]);
  matches = 0; moves = 0; flipped = []; locked = false;
  movesEl.textContent = "Drag: 0";
  winEl.textContent = "";
  board.innerHTML = "";
  cards.forEach((icon, i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.dataset.index = i;
    el.innerHTML = `<span class="face">${icon}</span>`;
    el.addEventListener("click", () => flip(el, icon));
    board.appendChild(el);
  });
}

function flip(el, icon) {
  if (locked || el.classList.contains("flipped") || el.classList.contains("matched")) return;
  el.classList.add("flipped");
  flipped.push({ el, icon });

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = "Drag: " + moves;
    locked = true;
    const [a, b] = flipped;
    if (a.icon === b.icon) {
      a.el.classList.add("matched");
      b.el.classList.add("matched");
      matches++;
      flipped = [];
      locked = false;
      if (matches === icons.length) {
        const best = parseInt(localStorage.getItem("cartridgeMatchBestMoves") || "999", 10);
        if (moves < best) localStorage.setItem("cartridgeMatchBestMoves", String(moves));
        winEl.textContent = `Klart på ${moves} drag! 🎉`;
      }
    } else {
      setTimeout(() => {
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        flipped = [];
        locked = false;
      }, 700);
    }
  }
}

document.getElementById("again").addEventListener("click", build);
build();
</script>
<script src="i18n-data.js"></script>
<script src="../../i18n.js"></script>
</body>
</html>
